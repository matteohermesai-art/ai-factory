# docker-compose.yml - AI Factory Infrastructure
version: "3.9"

services:
  # AI Factory API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-factory-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://neon:neon@db:5432/neoncity
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=info
      - MAX_WORKERS=5
      - ENABLE_CRON=true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - net

  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: ai-factory-db
    environment:
      POSTGRES_USER: neon
      POSTGRES_PASSWORD: neon
      POSTGRES_DB: neoncity
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_is_ready -U neon -d neoncity"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - net

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ai-factory-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - net

volumes:
  pgdata:
  redisdata:

networks:
  net:
    driver: bridge
