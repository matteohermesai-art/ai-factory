# docker-compose.yml - AI Factory Infrastructure
version: "3.9"

services:
  # Neon City Simulation API
  neon-city-api:
    build:
      context: ./neon-city
      dockerfile: Dockerfile
    container_name: neon-city-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://neon:neon@db:5432/neoncity
      - REDIS_URL=redis://redis:6379
      - GRID_WIDTH=80
      - GRID_HEIGHT=80
      - TICK_INTERVAL_SECONDS=1.0
      - LOG_LEVEL=info
      - SEED=42
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - neon-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - net

  # Factory Orchestrator API
  factory-api:
    build:
      context: ./factory-api
      dockerfile: Dockerfile
    container_name: factory-api
    ports:
      - "8080:8080"
    environment:
      - NEON_CITY_URL=http://neon-city-api:8000
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=info
    depends_on:
      - neon-city-api
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - net

  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: ai-factory-db
    environment:
      POSTGRES_USER: neon
      POSTGRES_PASSWORD: neon
      POSTGRES_DB: neoncity
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neon -d neoncity"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - net

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ai-factory-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - net

volumes:
  pgdata:
  redisdata:
  neon-data:

networks:
  net:
    driver: bridge
